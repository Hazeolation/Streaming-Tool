    <img class="mode-image" src="assets/modes/tc.png" alt="Tower Control Icon" (click)="changeMode('tc')">
    <img class="mode-image" src="assets/modes/rm.png" alt="Rainmaker Icon" (click)="changeMode('rm')">
    <img class="mode-image" src="assets/modes/cb.png" alt="Clam Blitz Icon" (click)="changeMode('cb')">
