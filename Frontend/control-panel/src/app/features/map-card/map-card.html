<div
    class="map-card"
    [class.hidden]="!map.isVisible">
    <img class="map-image" [src]="map.imageUrl" alt="{{ map.mapName }}">
    <div class="overlay">
        <div class="controls">
            <button
            class="teamButton alpha"
            (click)="setWinner('alpha')">
            {{ state().teamAlphaName }}
        </button>
        <button
            class="teamButton bravo"
            (click)="setWinner('bravo')">
            {{ state().teamBravoName }}
        </button>
    </div>
    <img class="mode-image" [src]="'assets/modes/' + (state().maps.find(m => m.mapId === map.mapId)?.modeId) + '.png'" alt="Mode Icon">
    <div class="settings__container">
        <select [ngModel]="map.mapId" (ngModelChange)="updateMap($event)">
            <option *ngFor="let entry of availableMaps" [value]="entry.id">
                {{ entry.mapName }}
            </option>
        </select>
        <button
            class="edit"
            (click)="openEditMenu()">
            Bearbeiten
        </button>
    </div>
    <app-edit-card class="edit-menu"*ngIf="showEditMenu" (onCloseClick)="closeEditMenu()" (onModeChange)="updateMode($event)" (onDeleteMap)="removeMap()" />
</div>
