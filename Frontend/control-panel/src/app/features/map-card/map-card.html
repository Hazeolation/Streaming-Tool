<div class="map-card" [class.hidden]="!map.isVisible" [class.map-won]="map.winner !== null">
  <img class="map-image" [src]="map.imageUrl" alt="{{ map.mapName }}" />
  <div class="overlay">
    <div class="controls" [class.alpha-is-left]="state().alphaIsLeft">
      <button
        class="team-button"
        [class.map-won]="state().maps.find((m) => m.id === map.id)?.winner === 'alpha'"
        [ngClass]="state().alphaIsLeft ? 'button-alpha-color' : 'button-bravo-color'"
        (click)="handleWinnerSelection('alpha')"
      >
        {{ state().teamAlphaName }}
      </button>
      <button
        class="team-button"
        [class.map-won]="state().maps.find((m) => m.id === map.id)?.winner === 'bravo'"
        [ngClass]="state().alphaIsLeft ? 'button-bravo-color' : 'button-alpha-color'"
        (click)="handleWinnerSelection('bravo')"
      >
        {{ state().teamBravoName }}
      </button>
    </div>
    <img class="mode-image" [src]="'assets/modes/' + map.modeId + '.png'" alt="Mode Icon" />
    <div class="settings__container">
      <select [ngModel]="map.mapId" (ngModelChange)="updateMap($event)">
        @for (entry of availableMaps; track entry) {
          <option [value]="entry.id">
            {{ entry.mapName }}
          </option>
        }
      </select>
      <button class="edit" (click)="openEditMenu()">Bearbeiten</button>
    </div>
    @if (showEditMenu) {
      <app-edit-card
        class="edit-menu"
        (onCloseClick)="closeEditMenu()"
        (onModeChange)="updateMode($event)"
        (onDeleteMap)="removeMap()"
      />
    }
  </div>
</div>
