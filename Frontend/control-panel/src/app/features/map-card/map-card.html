<div
    class="map-card"
    [class.hidden]="!map.isVisible">
    <img [src]="map.isVisible ? map.imageUrl : 'assets/maps/Shifty-Station.png'" alt="{{ map.mapName }}">
    <div class="overlay">
        <div class="controls">
            <button
            class="teamButton alpha"
            (click)="setWinner('alpha')">
            {{ state().teamAlphaName }}
        </button>
        <button
            class="teamButton bravo"
            (click)="setWinner('bravo')">
            {{ state().teamBravoName }}
        </button>
    </div>
    <div class="settings__container">
        <select [ngModel]="map.mapId" (ngModelChange)="updateMap($event)">
            <option *ngFor="let entry of availableMaps" [value]="entry.id">
                {{ entry.mapName }}
            </option>
        </select>
        <button
            class="edit"
            (click)="openEditMenu()">
            Edit
        </button>
    </div>
</div>
