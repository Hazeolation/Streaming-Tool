<div
    class="commentator-box dsb-panel"
    [class.overlay-hidden]="!state().showCommentatorBox">

    <span class="streamer-text">
        Streamer: {{ state().streamer || 'Streamer' }}
    </span>

    <span class="casters-text">
        Kommentatoren: {{ state().commentator1 || 'Caster 1' }}, {{ state().commentator2 || 'Caster 2' }}
    </span>

    <img src="assets/dsb/DSB_Logo.png" alt="DSB Logo" class="dsb-logo-small">
</div>
