<div
    class="commentator-box dsb-panel"
    [class.overlay-hidden]="!state().showCommentatorBox">

    <div class="label">
        CASTERS
    </div>

    <div class="casters">
        <div class="caster">
            {{ state().commentator1 || 'Caster 1' }}
        </div>

        <div class="caster">
            {{ state().commentator2 || 'Caster 2' }}
        </div>
    </div>

    <img src="assets/dsb/DSB_Logo.png" width="40px" alt="DSB Logo">
</div>
