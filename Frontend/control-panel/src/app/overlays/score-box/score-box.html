<div class="score-box dsb-panel" [class.overlay-hidden]="!state().showScoreBox">
  <div class="team-left__container">
    <app-resizable-text
      class="team-left-name"
      [resizableTextContent]="teamNameSwitchingService.leftTeamName"
    ></app-resizable-text>

    <span class="score team-left-score">{{ teamNameSwitchingService.leftScore }}</span>
  </div>

  <div class="team-right__container">
    <app-resizable-text
      class="team-right-name"
      [resizableTextContent]="teamNameSwitchingService.rightTeamName"
    ></app-resizable-text>

    <span class="score team-right-score">{{ teamNameSwitchingService.rightScore }}</span>
  </div>

  <span class="tourney tourney-info-text">
    Division {{ state().division }} - Woche {{ state().week }}
  </span>
</div>
<app-commentator-box class="make-responsive" [onMapScreen]="true"></app-commentator-box>
