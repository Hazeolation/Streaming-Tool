<div class="score-box dsb-panel" [class.overlay-hidden]="!state().showScoreBox">
  <div class="team-left__container">
    <span class="team team-left-name">{{ teamNameSwitchingService.leftTeamName }}</span>

    <span class="team team-left-score">{{ teamNameSwitchingService.leftScore }}</span>
  </div>

  <div class="team-right__container">
    <span class="team team-right-name">{{ teamNameSwitchingService.rightTeamName }}</span>

    <span class="team team-right-score">{{ teamNameSwitchingService.rightScore }}</span>
  </div>

  <span class="team tourney-info-text">
    Division {{ state().division }} - Woche {{ state().week }}
  </span>
</div>
<app-commentator-box class="make-responsive" [onMapScreen]="true"></app-commentator-box>
