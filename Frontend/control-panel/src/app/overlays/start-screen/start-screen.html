<div class="start-screen">
  <img class="dsb-logo" src="assets/dsb/DSB_Logo-Large.png" />
  <div class="match-info__container">
    <span class="current-match-text"> Nächstes Match: </span>

    <div class="division__container">
      <span class="division-text">
        Woche {{ state().week }} - Division {{ state().division }}
      </span>

      <span class="division-bg-splat"></span>
    </div>

    <app-resizable-text [resizableTextContent]="state().teamAlphaName" />

    <span class="versus-text"> VS. </span>

    <app-resizable-text [resizableTextContent]="state().teamBravoName" />

    <span class="countdown-timer"> 00:00 </span>
  </div>
</div>
