<div class="sidebar">
  <section>
    <h2>Teams</h2>
    <input
      [ngModel]="state().teamAlphaName"
      (ngModelChange)="
        stateService.update({
          teamAlphaName: $event,
        })
      "
      maxLength="30"
    />
    <input
      [ngModel]="state().teamBravoName"
      (ngModelChange)="
        stateService.update({
          teamBravoName: $event,
        })
      "
      maxLength="30"
    />
  </section>

  <section>
    <h2>Farben</h2>
    @if (!state().colorLockActive) {
      <button class="click-button" (click)="handleNextColorButtonClick()">Nächste Farbe</button>
    }
    <button
      class="click-button open-colors-settings-dialog-button"
      (click)="handleColorSettingsButtonClick()"
    >
      Einstellungen
    </button>
  </section>
  <section>
    <div class="swap-sides">
      <h2>Seiten wechseln</h2>
      <label
        (click)="
          stateService.update({
            alphaIsLeft: !state().alphaIsLeft,
          })
        "
      >
        <app-toggle-slider
          #alphaLeftToggleSlider
          class="toggle-slider-alpha-left"
          [class.toggled]="state().alphaIsLeft"
        />
        Alpha links
      </label>
    </div>
  </section>

  <section>
    <h2>Sichtbarkeit des Overlays</h2>
    <label
      (click)="
        stateService.update({
          showMapScreen: !state().showMapScreen,
        })
      "
    >
      <app-toggle-slider
        #showMapScreenToggleSlider
        class="toggle-slider-show-map-screen"
        [class.toggled]="state().showMapScreen"
      />
      Kartenanzeige
    </label>

    <label
      (click)="
        stateService.update({
          showScoreBox: !state().showScoreBox,
        })
      "
    >
      <app-toggle-slider
        #showScoreBoxToggleSlider
        class="toggle-slider-show-score-box"
        [class.toggled]="state().showScoreBox"
      />
      Spielstand
    </label>

    <label
      (click)="
        stateService.update({
          showCommentatorBox: !state().showCommentatorBox,
        })
      "
    >
      <app-toggle-slider
        #showCommentatorBoxToggleSlider
        class="toggle-slider-show-commentator-box"
        [class.toggled]="state().showCommentatorBox"
      />
      Kommentatoren
    </label>
  </section>

  <section>
    <h2>Ein- / Ausblenden Kommentatorenbox</h2>
    <button
      class="click-button hide-comm-box-button"
      [disabled]="commentatorBoxTimeData().displayMode !== commBoxDisplayMode.Manual"
      (click)="handleHideButtonClick()"
    >
      Ausblenden
    </button>

    <button
      class="click-button show-comm-box-button"
      [disabled]="commentatorBoxTimeData().displayMode !== commBoxDisplayMode.Manual"
      (click)="handleShowButtonClick()"
    >
      Einblenden
    </button>

    <button
      class="click-button show-comm-box-temp-button"
      [disabled]="commentatorBoxTimeData().displayMode !== commBoxDisplayMode.Manual"
      (click)="handleShowTempButtonClick()"
    >
      Temporär Einblenden
    </button>
  </section>

  <section>
    <h2>Restliche Einstellungen</h2>
    <button
      class="click-button open-tourney-settings-dialog-button"
      (click)="handleTourneySettingsButtonClick()"
    >
      Turniereinstellungen
    </button>
    <button
      class="click-button open-streamer-comms-dialog-button"
      (click)="handleStreamerCommsButtonClick()"
    >
      Streamer & Kommentatoren
    </button>
    <button
      class="click-button open-comm-box-settings-dialog-button"
      (click)="handleCommBoxSettingsButtonClick()"
    >
      Ein- / Ausblenden Kommentatorenbox
    </button>
    <button
      class="click-button open-socials-dialog-button"
      (click)="handleSocialsSettingsButtonClick()"
    >
      Socials
    </button>
  </section>
  <img src="assets/dsb/DSB_Logo.png" width="100px" />
</div>
