@let visibleColors =
  state().colorLockActive ? stateService.colorLockColors : stateService.matchColors;
<h1 mat-dialog-title>Farbeinstellungen</h1>
<mat-dialog-content>
  <label
    (click)="
      stateService.update({
        colorLockActive: !state().colorLockActive,
        currentColorsId: 0,
      })
    "
  >
    Color Lock
    <app-toggle-slider [class.toggled]="state().colorLockActive" />
  </label>
  <h2>Farben</h2>
  @for (color of visibleColors; track color.id) {
    <div class="color-display__container">
      <div class="color-display" [ngStyle]="{ 'background-color': color.colorAlpha }"></div>
      <div class="color-display" [ngStyle]="{ 'background-color': color.colorBravo }"></div>
      <app-toggle-slider
        [class.toggled]="state().currentColorsId === color.id"
        (onToggleSliderClick)="
          stateService.update({
            currentColorsId: color.id,
          })
        "
      />
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-dialog-close>✖</button>
</mat-dialog-actions>
