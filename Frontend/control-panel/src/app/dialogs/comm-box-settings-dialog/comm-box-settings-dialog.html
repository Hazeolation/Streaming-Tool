<h1 mat-dialog-title>Ein- / Ausblenden Kommentatorbox</h1>
<mat-dialog-content>
  <h2>Ein- / Ausblendemodus</h2>
  <div class="comm-box-display-state-buttons__container">
    <button
      class="toggle-button display-mode-button manual-display-mode-button"
      [class.toggled]="commentatorBoxTimeData().displayMode === commBoxDisplayMode.Manual"
      (click)="
        commentatorBoxTimeDataService.update({
          displayMode: commBoxDisplayMode.Manual,
        })
      "
    >
      Manuell
    </button>
    <button
      class="toggle-button display-mode-button auto-display-mode-button"
      [class.toggled]="commentatorBoxTimeData().displayMode === commBoxDisplayMode.Auto"
      (click)="
        commentatorBoxTimeDataService.update({
          displayMode: commBoxDisplayMode.Auto,
        })
      "
    >
      Automatisch
    </button>
  </div>

  @switch (commentatorBoxTimeData().displayMode) {
    @case (commBoxDisplayMode.Manual) {
      <section class="comm-box-visible-time-input__section no-margin">
        <h2>Zeit sichtbar (In Sekunden)</h2>
        <input
          class="show-comm-box-interval-input"
          type="number"
          min="5"
          [ngModel]="commentatorBoxTimeData().hideDisplayIntervalInSeconds"
          (ngModelChange)="
            commentatorBoxTimeDataService.update({
              hideDisplayIntervalInSeconds: $event,
            })
          "
        />
      </section>
    }

    @case (commBoxDisplayMode.Auto) {
      <section class="comm-box-visible-time-input__section">
        <h2>Zeit sichtbar (In Sekunden)</h2>
        <input
          class="show-comm-box-interval-input"
          type="number"
          min="5"
          [ngModel]="commentatorBoxTimeData().hideDisplayIntervalInSeconds"
          (ngModelChange)="
            commentatorBoxTimeDataService.update({
              hideDisplayIntervalInSeconds: $event,
            })
          "
        />
      </section>

      <section class="comm-box-hidden-time-input__section">
        <h2>Zeit unsichtbar (In Sekunden)</h2>
        <input
          class="hide-comm-box-interval-input"
          type="number"
          min="5"
          [ngModel]="commentatorBoxTimeData().showDisplayIntervalInSeconds"
          (ngModelChange)="
            commentatorBoxTimeDataService.update({
              showDisplayIntervalInSeconds: $event,
            })
          "
        />
      </section>
    }
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button class="click-button" mat-dialog-close>✖</button>
</mat-dialog-actions>
