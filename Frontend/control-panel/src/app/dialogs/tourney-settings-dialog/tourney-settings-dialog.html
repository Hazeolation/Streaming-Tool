<h1 mat-dialog-title>Turniereinstellungen</h1>
<mat-dialog-content>
  <section class="division-section">
    <h2>Division</h2>
    <select
      [ngModel]="state().division"
      (ngModelChange)="
        stateService.update({
          division: $event,
        })
      "
    >
      @for (division of availableDivisions; track division) {
        <option [ngValue]="division.id">
          {{ division.name }}
        </option>
      }
    </select>
  </section>

  <section class="week-section">
    <h2>Woche</h2>
    <input
      type="number"
      [ngModel]="state().week"
      (ngModelChange)="
        stateService.update({
          week: $event,
        })
      "
    />
  </section>

  <section class="start-time-section">
    <h2>Startzeit</h2>
    <input
      type="datetime-local"
      [ngModel]="state().startTime"
      (ngModelChange)="
        stateService.update({
          startTime: $event,
        })
      "
    />
  </section>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-dialog-close>✖</button>
</mat-dialog-actions>
