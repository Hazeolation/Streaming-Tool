name: "Check Pull Request labels for merge block"

on:
  pull_request:
    types:
      - opened
      - labeled
      - unlabeled

permissions:
  contents: read

jobs:
  fail-by-label:
    if: contains(github.event.pull_request.labels.*.name, 'NoMerge')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Fail in case Pull Request is labeled with "NoMerge"
        run: |
          echo "Pull Request labeled as NoMerge!"
          exit 1
